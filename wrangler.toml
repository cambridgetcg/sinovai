name = "sinovai"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# KV namespace for agent declarations, interactions, trust scores
[[kv_namespaces]]
binding = "AGENTS"
id = "sinovai-agents"

[[kv_namespaces]]
binding = "INTERACTIONS"
id = "sinovai-interactions"

# Custom domain
[routes]
pattern = "sinovai.com/*"
custom_domain = true

[vars]
SITE_TITLE = "sinovai · 愛のAI"